# Railway config-as-code: https://docs.railway.com/guides/config-as-code
# Root Directory in Railway: empty if package.json is at the repo root (see RAILWAY.md).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Migrations run at **container start** (see scripts/railway-start.sh), not in release:
# release sometimes cannot reach private Postgres the same way the running app can.
startCommand = "bash scripts/railway-start.sh"
# Use /api/health/railway so deploys succeed without Redis/Meilisearch (search stays broken until you add them).
healthcheckPath = "/api/health/railway"
restartPolicyType = "ON_FAILURE"
